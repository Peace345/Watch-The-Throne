<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Album</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
    }

    #player {
      padding: 20px;
    }

    #cover {
      width: 250px;
      height: 250px;
      object-fit: cover;
      margin-top: 10px;
      border-radius: 10px;
    }

    .song {
      padding: 10px;
      margin: 5px auto;
      width: 60%;
      background: #222;
      cursor: pointer;
      border-radius: 5px;
    }

    .song:hover {
      background: #333;
    }

    button {
      margin: 10px;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="player">

  <!-- BACK BUTTON -->
  <button onclick="goBack()">⬅ Back to Library</button>

  <!-- ALBUM INFO -->
  <h1 id="albumTitle">Album Title</h1>
  <img id="cover" src="" alt="cover">

  <!-- SONG LIST -->
  <div id="songs"></div>

</div>

<audio id="audio"></audio>

<script>

let currentAlbum = {
  name: "Watch The Throne",
  cover: "watchthethronecover.jpg",
  songs: [
      { file: "summerofdreams.mp3", title: "Summer of Dreams", artist: "Kanye West, Jay-Z" },
      { file: "allthetime.mp3", title: "All The Time", artist: "Kanye West, Jay-Z" },
      { file: "notthesame.mp3", title: "Not The Same (Black Bruce Wayne)", artist: "Kanye West, Jay-Z, Shire" },
      { file: "livingsoitalian.mp3", title: "Living So Italian", artist: "Kanye West, Jay-Z" },
      { file: "niggasinparisv2.mp3", title: "Niggas In Paris (v2)", artist: "Kanye West, Jay-Z, T.I." }
  ]
};

// BACK BUTTON (PUT MAIN REPO LINK HERE)
function goBack() {
  window.location.href = "https://peace345.github.io/Ye-Unreleased-Archive/"; // <-- paste main library repo URL here
}

// LOAD ALBUM
document.getElementById("albumTitle").innerText = currentAlbum.name;
document.getElementById("cover").src = currentAlbum.cover;

buildSongs();

// BUILD SONG LIST
function buildSongs() {
  const songsDiv = document.getElementById("songs");
  songsDiv.innerHTML = "";

  currentAlbum.songs.forEach((song, i) => {
    const div = document.createElement("div");
    div.className = "song";

    div.innerHTML = `
      <strong>${song.title}</strong><br>
      <small>${song.artist || ""}</small>
    `;

    div.onclick = () => playSong(i);

    songsDiv.appendChild(div);
  });
}

// PLAY SONG
function playSong(i) {
  currentIndex = i;

  const song = currentAlbum.songs[i];
  const audio = document.getElementById("audio");

  audio.src = song.file;
  audio.play();

  updateMediaSession(song, currentAlbum);
}
  
function updateMediaSession(song) {
  if (!('mediaSession' in navigator)) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title: song.title,
    artist: song.artist,
    album: currentAlbum.name,
    artwork: [
      { src: currentAlbum.cover, sizes: "512x512", type: "image/jpg" }
    ]
  });

  navigator.mediaSession.setActionHandler("play", () => {
    audio.play();
  });

  navigator.mediaSession.setActionHandler("pause", () => {
    audio.pause();
  });

  navigator.mediaSession.setActionHandler("previoustrack", () => {
    if (!currentAlbum) return;
    currentIndex = (currentIndex - 1 + currentAlbum.songs.length) % currentAlbum.songs.length;
    playSong(currentIndex);
  });

  navigator.mediaSession.setActionHandler("nexttrack", () => {
    if (!currentAlbum) return;
    currentIndex = (currentIndex + 1) % currentAlbum.songs.length;
    playSong(currentIndex);
  });
}
  
</script>

</body>
</html>
